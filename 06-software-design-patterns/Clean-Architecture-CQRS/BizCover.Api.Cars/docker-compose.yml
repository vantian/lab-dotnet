version: '3.9'

services:
  cars-api:
    image: bizcover-api-cars
    build:
      context: ..
      dockerfile: BizCover.Api.Cars/Dockerfile
    ports:
      - "5000:80"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
    container_name: bizcover-api-cars-local

